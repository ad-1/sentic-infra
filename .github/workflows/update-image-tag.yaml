# Reusable workflow — Update service image tag in a Kustomize overlay
#
# Called from service repos after a successful image push. Updates the
# newTag value in the service repo's Kustomize overlay and opens a PR.
# Argo CD detects the merged PR and rolls out the new image automatically.
#
# Usage in a service repo:
#
#   jobs:
#     deploy:
#       needs: build
#       uses: ad-1/sentic-infra/.github/workflows/update-image-tag.yaml@main
#       with:
#         service-name: sentic-news-ingester
#         image: ghcr.io/ad-1/sentic-news-ingester
#         tag: ${{ needs.build.outputs.image-tag }}
#       secrets:
#         token: ${{ secrets.GITHUB_TOKEN }}
#
# See docs/ONBOARDING.md for full CI integration guidance.

name: Update Service Image Tag

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (used in the PR title and branch name)"
        required: true
        type: string
      image:
        description: "Full image name without tag (e.g. ghcr.io/ad-1/sentic-news-ingester)"
        required: true
        type: string
      tag:
        description: "New image tag to write into the overlay kustomization.yaml"
        required: true
        type: string
      overlay-path:
        description: "Relative path to the Kustomize overlay directory inside the
          service repo"
        required: false
        type: string
        default: "deploy/overlays/dev"
    secrets:
      token:
        description: "GitHub token with write access to the calling repository"
        required: true

jobs:
  update-tag:
    name: Update image tag and open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.token }}

      - name: Validate overlay file exists
        run: |
          FILE="${{ inputs.overlay-path }}/kustomization.yaml"
          if [ ! -f "$FILE" ]; then
            echo "❌ Overlay file not found: $FILE"
            echo "   Expected path: ${{ inputs.overlay-path }}/kustomization.yaml"
            echo "   Ensure the service repo follows the layout in docs/ONBOARDING.md"
            exit 1
          fi
          echo "✅ Found overlay file: $FILE"

      - name: Update newTag in kustomization.yaml
        run: |
          FILE="${{ inputs.overlay-path }}/kustomization.yaml"
          # Validate the file contains an images block with a newTag entry before rewriting
          if ! grep -q "newTag:" "$FILE"; then
            echo "❌ No 'newTag:' entry found in $FILE"
            echo "   Add an images block to the overlay before using this workflow."
            exit 1
          fi
          sed -i "s|newTag:.*|newTag: \"${{ inputs.tag }}\"|" "$FILE"
          echo "✅ Updated $FILE"
          echo "   image: ${{ inputs.image }}"
          echo "   tag:   ${{ inputs.tag }}"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.token }}
          commit-message: "chore(deploy): update ${{ inputs.service-name }} image tag to
            ${{ inputs.tag }}"
          branch: "deploy/${{ inputs.service-name }}-${{ inputs.tag }}"
          title: "deploy(${{ inputs.service-name }}): ${{ inputs.tag }}"
          body: |
            Automated image tag update generated by the `sentic-infra` reusable workflow.

            | Field | Value |
            |---|---|
            | **Service** | `${{ inputs.service-name }}` |
            | **Image** | `${{ inputs.image }}` |
            | **Tag** | `${{ inputs.tag }}` |
            | **Overlay** | `${{ inputs.overlay-path }}` |

            Merging this PR triggers Argo CD to roll out the new image automatically.
            No manual `kubectl` action is required.
          labels: |
            deploy
            automated
          delete-branch: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/ad-1/sentic-infra"
    targetRevision: main
    path: "infrastructure/operators"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5 # Cert-manager webhooks can take time; retry lets waves complete reliably
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentic-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/ad-1/sentic-infra"
    targetRevision: main
    # Root app recurses manifests/ only. Sync waves inside control order:
    #   wave 1-3 → operator Applications
    #   wave 5   → RabbitmqCluster
    #   wave 10  → Queue topology
    path: "manifests"
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true # If you delete a file in Git, Argo deletes it in K8s
      selfHeal: true # If you manually change K8s, Argo "overwrites" it back to Git state
    retry:
      limit: 5 # Retry while child apps and CRDs settle
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

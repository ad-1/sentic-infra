apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentic-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/ad-1/sentic-infra"
    targetRevision: master
    path: "." # Argo looks at the root of the repo
    directory:
      recurse: true # This tells Argo to look into the /topology folder too
      exclude: "argocd/**"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: sentic
  syncPolicy:
    automated:
      prune: true # If you delete a file in Git, Argo deletes it in K8s
      selfHeal: true # If you manually change K8s, Argo "overwrites" it back to Git state

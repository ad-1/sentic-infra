apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentic-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/ad-1/sentic-infra"
    targetRevision: main
    # Root app should only manage child Application manifests.
    # infrastructure/root-app.yaml then owns infrastructure/operators.
    path: "infrastructure"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true # If you delete a file in Git, Argo deletes it in K8s
      selfHeal: true # If you manually change K8s, Argo "overwrites" it back to Git state
    retry:
      limit: 5 # Retry while child apps and CRDs settle
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

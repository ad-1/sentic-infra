apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-cluster-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: "https://github.com/rabbitmq/cluster-operator"
    targetRevision: "v2.20.1"
    path: "config/installation"
    kustomize:
      # Pin the container image tag — config/installation uses :latest by default
      images:
        - ghcr.io/rabbitmq/cluster-operator:v2.20.1
  destination:
    server: "https://kubernetes.default.svc"
    namespace: rabbitmq-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

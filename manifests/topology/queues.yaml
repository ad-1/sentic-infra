# ---------------------------------------------------------------------------
# Sentic queue topology
#
# Managed by the RabbitMQ Messaging Topology Operator.
# Each Queue resource is reconciled continuously — if a queue is deleted
# in the broker it will be re-declared automatically.
#
# Sync wave 10: applied after the RabbitmqCluster (wave 5) is healthy and
# the broker is accepting connections.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# raw-news
# Published by sentic-signal. Contains unprocessed news articles.
# ---------------------------------------------------------------------------
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: raw-news
  namespace: sentic
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  name: raw-news
  durable: true
  autoDelete: false
  rabbitmqClusterReference:
    name: definition
    namespace: sentic
---
